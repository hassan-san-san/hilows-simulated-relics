<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilows Simulated Relics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Hilows Simulated Relics</h1>
            <div class="controls">
                <!-- Replaced single button with two -->
                <button id="pull-cavern-btn" class="pull-btn">Pull Cavern Relic (4pc)</button>
                <button id="pull-planar-btn" class="pull-btn">Pull Planar Ornament (2pc)</button>
            </div>
            <nav class="view-tabs">
                <button id="inventory-tab-btn" class="tab-btn active">Inventory</button>
                <button id="trash-tab-btn" class="tab-btn">Trash</button>
                <button id="characters-tab-btn" class="tab-btn" disabled>Characters</button>
            </nav>
        </header>
        
        <main id="content-area" class="results-grid"></main>

        <div id="trash-controls" class="hidden">
            <button id="scrap-all-btn">Scrap All Trashed Relics</button>
        </div>
    </div>
    
    <!-- Added a footer for the disclaimer -->
    <footer>
        <p>Site not updating after a change? Try a hard refresh: Ctrl+Shift+R (Windows/Linux) or Cmd+Shift+R (Mac).</p>
    </footer>
    
    <script src="script.js" type="module"></script>
</body>
</html>
