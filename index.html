<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilows Simulated Relics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        <!-- SIDE NAVIGATION -->
        <nav class="side-nav">
            <h2>HSR</h2>
            <button id="nav-pull-btn" class="nav-button">Pull Relics</button>
            <button id="nav-inventory-btn" class="nav-button">Inventory</button>
            <button id="nav-characters-btn" class="nav-button" disabled>Characters</button>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">
            <!-- PULL PAGE -->
            <div id="pull-page" class="page">
                <h1>Pull Relics</h1>
                <button id="pull-button">Pull Relic</button> <!-- Changed from Pull x10 -->
                <div id="pull-results-container" class="results-grid">
                    <!-- The newly pulled relic will appear here! -->
                </div>
            </div>

            <!-- INVENTORY PAGE -->
            <div id="inventory-page" class="page hidden">
                <h1>Inventory</h1>
                <div id="inventory-container" class="results-grid">
                    <!-- The entire inventory will be displayed here! -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
