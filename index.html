<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilows Simulated Relics</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- SIDE NAVIGATION -->
        <nav class="side-nav">
            <h2>HSR</h2>
            <button id="nav-pull-btn" class="nav-button active">Pull Relics</button>
            <button id="nav-inventory-btn" class="nav-button">Inventory</button>
            <button id="nav-characters-btn" class="nav-button" disabled>Characters</button>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="main-content">

            <!-- PULL PAGE -->
            <div id="pull-page" class="page">
                <h1>Pull Relics</h1>
                <div class="pull-config">
                    <div class="pull-type-selector">
                        <button id="pull-type-cavern" class="pull-type-btn active">Cavern Relics</button>
                        <button id="pull-type-planar" class="pull-type-btn">Planar Ornaments</button>
                    </div>
                    <div id="set-selector-dropdown"></div>
                    <button id="pull-btn">Pull Relic</button>
                </div>
                <div id="set-bonus-display" class="set-bonus-display hidden">
                    <div id="bonus-2pc"></div>
                    <div id="bonus-4pc" class="hidden"></div>
                </div>
                <div id="pull-results-container" class="results-grid"></div>
            </div>

            <!-- INVENTORY PAGE -->
            <div id="inventory-page" class="page hidden">
                <div class="inventory-header">
                    <h1>Inventory</h1>
                    <div class="inventory-sub-tabs">
                        <button id="inv-tab-inventory" class="inv-tab active">My Relics</button>
                        <button id="inv-tab-trash" class="inv-tab">Trash</button>
                    </div>
                </div>
                <div id="trash-controls" class="hidden">
                    <button id="scrap-all-btn">Scrap All</button>
                </div>

                <!-- FILTER & SORT BAR (My Relics only) -->
                <div id="inventory-filters" class="hidden">
                    <div class="filter-bar">
                        <div class="filter-group">
                            <label for="filter-piece">Piece</label>
                            <select id="filter-piece">
                                <option value="">All Pieces</option>
                                <option value="Head">Head</option>
                                <option value="Hands">Hands</option>
                                <option value="Body">Body</option>
                                <option value="Feet">Feet</option>
                                <option value="Planar Sphere">Planar Sphere</option>
                                <option value="Link Rope">Link Rope</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-set">Set</label>
                            <div id="filter-set"></div>
                        </div>
                        <div class="filter-group">
                            <label for="filter-mainstat">Main Stat</label>
                            <select id="filter-mainstat">
                                <option value="">All</option>
                                <option value="HP">HP</option>
                                <option value="ATK">ATK</option>
                                <option value="HP%">HP%</option>
                                <option value="ATK%">ATK%</option>
                                <option value="DEF%">DEF%</option>
                                <option value="SPD">SPD</option>
                                <option value="CRIT Rate">CRIT Rate</option>
                                <option value="CRIT DMG">CRIT DMG</option>
                                <option value="Effect Hit Rate">Effect Hit Rate</option>
                                <option value="Healing Boost">Healing Boost</option>
                                <option value="Break Effect">Break Effect</option>
                                <option value="Energy Regeneration Rate">Energy Regen Rate</option>
                                <option value="Physical DMG">Physical DMG</option>
                                <option value="Fire DMG">Fire DMG</option>
                                <option value="Ice DMG">Ice DMG</option>
                                <option value="Wind DMG">Wind DMG</option>
                                <option value="Lightning DMG">Lightning DMG</option>
                                <option value="Quantum DMG">Quantum DMG</option>
                                <option value="Imaginary DMG">Imaginary DMG</option>
                            </select>
                        </div>
                        <div class="filter-divider"></div>
                        <div class="filter-group">
                            <label for="sort-by">Sort By</label>
                            <select id="sort-by">
                                <option value="date">Date</option>
                                <option value="level">Level</option>
                                <option value="SPD">SPD</option>
                                <option value="CRIT Rate">CRIT Rate</option>
                                <option value="CRIT DMG">CRIT DMG</option>
                                <option value="HP%">HP%</option>
                                <option value="ATK%">ATK%</option>
                                <option value="DEF%">DEF%</option>
                                <option value="Break Effect">Break Effect</option>
                                <option value="Effect Hit Rate">Effect Hit Rate</option>
                                <option value="Effect RES">Effect RES</option>
                                <option value="HP">HP (flat)</option>
                                <option value="ATK">ATK (flat)</option>
                                <option value="DEF">DEF (flat)</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="sort-order">Order</label>
                            <select id="sort-order">
                                <option value="desc">↓ High → Low</option>
                                <option value="asc">↑ Low → High</option>
                            </select>
                        </div>
                        <button id="reset-filters-btn">Reset</button>
                    </div>
                    <div id="filter-count" class="filter-count"></div>
                </div>

                <div id="inventory-container" class="results-grid"></div>
            </div>

        </main>
    </div>

    <footer>
        <p>Site not updating after a change? Try a hard refresh: Ctrl+Shift+R (Windows/Linux) or Cmd+Shift+R (Mac).</p>
    </footer>

    <script src="script.js" type="module"></script>
</body>
</html>
